<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verum Omnis — AI Forensics for Truth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: #040D1B;
    color: #D5D8DD;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
  }
  .logo { max-width: 320px; width: 80vw; margin-bottom: 32px; filter: drop-shadow(0 0 40px rgba(74, 126, 199, 0.2)); }
  h1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 300;
    color: #F8F9FA;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }
  .tagline {
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: #D4A843;
    margin-bottom: 48px;
  }
  .actions { display: flex; flex-direction: column; gap: 16px; max-width: 400px; width: 100%; }
  .actions a {
    display: block;
    padding: 18px 32px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    transition: all 0.3s;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .actions .primary {
    background: linear-gradient(135deg, #D4A843 0%, #b8942a 100%);
    color: #040D1B;
  }
  .actions .primary:hover { background: #E8C567; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,168,67,0.3); }
  .actions .secondary {
    border: 1px solid #4A7EC7;
    color: #4A7EC7;
    background: transparent;
  }
  .actions .secondary:hover { border-color: #D4A843; color: #D4A843; }
  .footer {
    margin-top: 60px;
    font-family: 'JetBrains Mono', 'Courier New', monospace;
    font-size: 11px;
    color: #4A7EC7;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    line-height: 2;
  }
</style>
</head>
<body>
  <img src="https://verumglobal.foundation/images/logo-full.png" alt="Verum Omnis" class="logo" onerror="this.style.display='none'">
  <h1>Verum Omnis</h1>
  <div class="tagline">AI Forensics for Truth</div>
  <div class="actions">
    <a href="/seal-document.html" class="primary">Seal a Document</a>
    <a href="/verify.html" class="secondary">Verify a Seal</a>
    <a href="/documents-resources.html" class="secondary">Documents & Resources</a>
  </div>
  <div class="footer">
    Verum Omnis Foundation — Patent Pending<br>
    Constitution v6.0 Final — Article X Non-Weaponization Doctrine
  </div>
</body>
</html>
